version: "3.9"

services:
  ccr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-code-router
    ports:
      - "3456:3456"
      - "3457:3457"
      - "3458:3458"
    volumes:
      - ccr-data:/home/nonroot/.claude-code-router
    environment:
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  ccr-data:
